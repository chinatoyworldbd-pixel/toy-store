<!DOCTYPE html>
<html>
<head>
  <title>China Toy World</title>

  <style>
    body {
      font-family: Arial;
      margin:0;
      background:#f4f6f9;
    }

    header {
      background:#ff4d6d;
      color:white;
      padding:15px;
      text-align:center;
      font-size:20px;
      position:relative;
    }

    .admin-btn {
      position:absolute;
      right:20px;
      top:15px;
      background:black;
      color:white;
      padding:6px 12px;
      cursor:pointer;
      border-radius:5px;
    }

    .hero {
      background:url('https://i.imgur.com/7yUvePI.jpg');
      background-size:cover;
      text-align:center;
      color:white;
      padding:100px;
    }

    .products {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
    }

    .card {
      background:white;
      margin:10px;
      padding:10px;
      width:200px;
      border-radius:10px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      text-align:center;
      transition:0.3s;
    }

    .card:hover {
      transform:scale(1.05);
    }

    img {
      width:100%;
      height:150px;
      object-fit:cover;
      border-radius:8px;
    }

    button {
      background:#28a745;
      color:white;
      border:none;
      padding:6px 12px;
      cursor:pointer;
      margin-top:5px;
    }

    input {
      padding:6px;
      margin:5px;
    }

    /* ADMIN PANEL */
    .admin-panel {
      display:none;
      background:#1e1e2f;
      color:white;
      padding:20px;
    }

    .admin-panel input {
      background:#333;
      color:white;
      border:none;
    }

    .admin-card {
      background:#2c2c3e;
      padding:10px;
      margin:10px;
    }

  </style>
</head>

<body>

<header>
  🧸 China Toy World
  <span class="admin-btn" onclick="adminLogin()">Admin</span>
</header>

<div class="hero">
  <h1>WE SELL HAPPINESS</h1>
</div>

<h2 style="text-align:center;">🛍 Products</h2>
<div class="products" id="products"></div>

<h2 style="text-align:center;">📦 Order</h2>
<center>
  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <button onclick="placeOrder()">Order Now</button>
</center>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">

  <h2>⚙ Admin Dashboard</h2>

  <h3>➕ Add Product</h3>
  <input id="pname" placeholder="Name">
  <input id="pprice" placeholder="Price">
  <input id="pimg" placeholder="Image URL">
  <button onclick="addProduct()">Add</button>

  <h3>📦 Product List</h3>
  <div id="adminProducts"></div>

  <h3>📋 Orders</h3>
  <div id="orders"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHcIM6tcVzcj4YMqBiceU-2mkc2tDIRLw",
  authDomain: "china-toy-world.firebaseapp.com",
  projectId: "china-toy-world",
  storageBucket: "china-toy-world.firebasestorage.app",
  messagingSenderId: "203693443354",
  appId: "1:203693443354:web:e89dc8ba3dca3c81b404a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// LOAD PRODUCTS
async function loadProducts(){
  const querySnapshot = await getDocs(collection(db,"products"));
  let html="";
  let adminHTML="";

  querySnapshot.forEach(docSnap=>{
    let p=docSnap.data();
    let id=docSnap.id;

    html+=`
    <div class="card">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p>${p.price}৳</p>
    </div>`;

    adminHTML+=`
    <div class="admin-card">
      ${p.name} - ${p.price}৳
      <br>
      <input id="price-${id}" placeholder="New Price">
      <button onclick="updatePrice('${id}')">Update</button>
    </div>`;
  });

  document.getElementById("products").innerHTML=html;
  document.getElementById("adminProducts").innerHTML=adminHTML;
}
loadProducts();

// ADD PRODUCT
window.addProduct = async function(){
  let name=pname.value;
  let price=pprice.value;
  let img=pimg.value;

  await addDoc(collection(db,"products"),{name,price,img});
  alert("Added!");
  location.reload();
}

// UPDATE PRICE
window.updatePrice = async function(id){
  let newPrice=document.getElementById("price-"+id).value;
  const ref=doc(db,"products",id);
  await updateDoc(ref,{price:newPrice});
  alert("Updated!");
  location.reload();
}

// ORDER
window.placeOrder = async function(){
  await addDoc(collection(db,"orders"),{
    name:name.value,
    phone:phone.value
  });
  alert("Order placed!");
}

// LOAD ORDERS
async function loadOrders(){
  const querySnapshot = await getDocs(collection(db,"orders"));
  let html="";
  querySnapshot.forEach(doc=>{
    let o=doc.data();
    html+=`<div class="admin-card">${o.name} - ${o.phone}</div>`;
  });
  document.getElementById("orders").innerHTML=html;
}

// ADMIN LOGIN
window.adminLogin=function(){
  let pass=prompt("Enter Admin Password");
  if(pass==="1234"){
    document.getElementById("adminPanel").style.display="block";
    loadOrders();
  } else {
    alert("Wrong password");
  }
}
</script>

</body>
</html>
