<!DOCTYPE html>
<html>
<head>
  <title>China Toy World</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body {
      font-family: Arial;
      background: #fff5f7;
      margin: 0;
    }

    header {
      background: #ff4d6d;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 30px;
      font-weight: bold;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    button {
      background: #28a745;
      color: white;
      border: none;
      padding: 8px;
      cursor: pointer;
      margin-top: 5px;
    }

    .cart {
      padding: 20px;
    }

    .admin {
      position: fixed;
      top: 10px;
      right: 10px;
    }

    .admin-panel {
      display: none;
      background: white;
      padding: 10px;
      position: fixed;
      top: 50px;
      right: 10px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

<header>🐻 China Toy World</header>

<div class="admin">
  <button onclick="toggleAdmin()">Admin</button>
</div>

<div class="admin-panel" id="adminPanel">
  <h3>Add Product</h3>
  <input id="name" placeholder="Name"><br>
  <input id="price" placeholder="Price"><br>
  <input id="image" placeholder="Image URL"><br>
  <button onclick="addProduct()">Add</button>
</div>

<div class="products" id="products"></div>

<div class="cart">
  <h2>Cart</h2>
  <ul id="cart"></ul>
  <input id="custName" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <button onclick="placeOrder()">Order</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://guhhkfsbvbvhjbtkcuy.supabase.co",
  "YOUR_PUBLIC_KEY"
);

let cart = [];

async function loadProducts() {
  let { data } = await supabase.from("products").select("*");
  let div = document.getElementById("products");
  div.innerHTML = "";

  data.forEach(p => {
    div.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>৳${p.price}</p>
        <button onclick='addToCart(${JSON.stringify(p)})'>Add</button>
      </div>
    `;
  });
}

function addToCart(p) {
  cart.push(p);
  renderCart();
  alert("Added to cart");
}

function renderCart() {
  let ul = document.getElementById("cart");
  ul.innerHTML = "";
  cart.forEach((c,i)=>{
    ul.innerHTML += `<li>${c.name} - ${c.price}
    <button onclick="removeItem(${i})">X</button></li>`;
  });
}

function removeItem(i){
  cart.splice(i,1);
  renderCart();
}

async function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let image = document.getElementById("image").value;

  await supabase.from("products").insert([{name,price,image}]);
  alert("Product Added");
  loadProducts();
}

async function placeOrder(){
  let name = document.getElementById("custName").value;
  let phone = document.getElementById("phone").value;

  await supabase.from("orders").insert([{name,phone,cart: JSON.stringify(cart)}]);
  alert("Order Placed");
}

function toggleAdmin(){
  let p = document.getElementById("adminPanel");
  p.style.display = p.style.display==="block"?"none":"block";
}

loadProducts();
</script>

</body>
</html>
