<!DOCTYPE html>
<html>
<head>
  <title>China Toy World </title>
  <style>
    body { font-family: Arial; text-align:center; background:#f5f5f5; }
    .product { border:1px solid #ddd; padding:10px; margin:10px; display:inline-block; background:white; }
    button { background:green; color:white; padding:5px 10px; border:none; cursor:pointer; }
    input { padding:5px; margin:5px; }
    #admin { margin:20px; padding:10px; background:#fff; }
  </style>
</head>
<body>

<h1>🧸 China Toy World </h1>

<!-- ADMIN PANEL -->
<div id="admin">
  <h2>➕ Add Product</h2>
  <input id="name" placeholder="Product Name">
  <input id="price" placeholder="Price">
  <button onclick="addProduct()">Add Product</button>
</div>

<!-- PRODUCTS -->
<h2>🛍️ Products</h2>
<div id="products"></div>

<!-- CART -->
<h2>🛒 Cart</h2>
<ul id="cart"></ul>
<h3 id="total"></h3>

<!-- PAYMENT -->
<h2>💳 Payment (bKash)</h2>
<p>Send money to: <b>01XXXXXXXXX</b></p>
<p>After payment, send screenshot via WhatsApp</p>

<script>
let cart = [];

function addToCart(name, price) {
  cart.push({name, price});
  renderCart();
}

function renderCart() {
  let list = document.getElementById("cart");
  let total = 0;
  list.innerHTML = "";

  cart.forEach(item => {
    list.innerHTML += `<li>${item.name} - ${item.price}</li>`;
    total += Number(item.price);
  });

  document.getElementById("total").innerText = "Total: $" + total;
}
</script>

<!-- 🔥 FIREBASE FULL CODE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDHcIM6tcVzcj4YMqBiceU-2mkc2tDIRLw",
    authDomain: "china-toy-world.firebaseapp.com",
    projectId: "china-toy-world",
    storageBucket: "china-toy-world.firebasestorage.app",
    messagingSenderId: "203693443354",
    appId: "1:203693443354:web:e89dc8ba3dca3c81b404a3"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Add product
  window.addProduct = async function () {
    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;

    if (name && price) {
      await addDoc(collection(db, "products"), {
        name: name,
        price: price
      });
      alert("Product Added ✅");
    }
  };

  // Show products live
  onSnapshot(collection(db, "products"), (snapshot) => {
    let html = "";
    snapshot.forEach(doc => {
      let p = doc.data();
      html += `
        <div class="product">
          <h3>${p.name}</h3>
          <p>Price: ${p.price}</p>
          <button onclick="addToCart('${p.name}', ${p.price})">Add to Cart</button>
        </div>
      `;
    });

    document.getElementById("products").innerHTML = html;
  });
</script>

</body>
</html>
