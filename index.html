<!DOCTYPE html>
<html>
<head>
<title>China Toy World</title>

<!-- FIXED SUPABASE -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#fff5f7;}

header{
background:#ff3f6c;
color:white;
padding:20px;
font-size:30px;
text-align:center;
font-weight:bold;
position:relative;
}

.admin-btn{
position:absolute;
right:20px;
top:15px;
background:white;
color:#ff3f6c;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}
.admin-btn:hover{box-shadow:0 0 10px white;}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
width:220px;
margin:12px;
padding:10px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

button{
background:#ff3f6c;
color:white;
border:none;
padding:7px 12px;
margin-top:5px;
cursor:pointer;
border-radius:6px;
transition:0.3s;
}

button:hover{
box-shadow:0 0 10px #ff3f6c;
}

#notify{
position:fixed;
top:20px;
right:20px;
background:black;
color:white;
padding:10px;
border-radius:6px;
display:none;
}

#cartBox{
background:white;
margin:20px;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.admin-panel{
display:none;
background:#111;
color:white;
padding:20px;
}
</style>
</head>

<body>

<header>
🧸 CHINA TOY WORLD
<span class="admin-btn" onclick="adminLogin()">Admin</span>
</header>

<div id="notify"></div>

<h2 style="text-align:center;">Products</h2>
<div class="products" id="products"></div>

<div id="cartBox">
<h3>🛒 Cart</h3>
<ul id="cartList"></ul>
<h4 id="totalText"></h4>
</div>

<center>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<button onclick="placeOrder()">Order Now</button>
</center>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
<h2>Admin Panel</h2>

<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

<h3>Orders</h3>
<div id="orders"></div>
</div>

<script>

// 🔑 YOUR SUPABASE CONFIG
const supabase = window.supabase.createClient(
"https://guhhkfsbvbvhjbtkcuy.supabase.co",
"YOUR_ANON_KEY"
);

let cart=[];

// 🔔 NOTIFY
function notify(msg){
let n=document.getElementById("notify");
n.innerText=msg;
n.style.display="block";
setTimeout(()=>n.style.display="none",2000);
}

// 📦 LOAD PRODUCTS
async function load(){
let {data,error}=await supabase.from("products").select("*");

if(error){
notify("Database Error ❌");
return;
}

let html="";
data.forEach(p=>{
html+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<p>${p.price}৳</p>
<button onclick='addToCart(${JSON.stringify(p)})'>Add</button>
</div>`;
});
products.innerHTML=html;
}
load();

// 🛒 ADD TO CART
window.addToCart=function(p){
cart.push(p);
renderCart();
notify("Added to Cart ✅");
}

// 🛒 RENDER CART
function renderCart(){
let html="";
let total=0;

cart.forEach((p,i)=>{
html+=`<li>${p.name} - ${p.price}৳ 
<button onclick="removeItem(${i})">❌</button></li>`;
total+=Number(p.price);
});

cartList.innerHTML=html;
document.getElementById("totalText").innerText="Total: "+total+"৳";
}

// ❌ REMOVE ITEM
window.removeItem=function(i){
cart.splice(i,1);
renderCart();
notify("Removed ❌");
}

// 📦 PLACE ORDER
window.placeOrder=async function(){
if(!name.value || !phone.value){
notify("Info Missing ⚠️");
return;
}

await supabase.from("orders").insert([{
name:name.value,
phone:phone.value,
cart:JSON.stringify(cart)
}]);

notify("Order Placed ✅");
cart=[];
renderCart();
}

// 🔐 ADMIN LOGIN
window.adminLogin=function(){
let p=prompt("Enter Admin Password");
if(p==="1234"){
adminPanel.style.display="block";
loadOrders();
notify("Admin Login Success ✅");
}else{
notify("Wrong Password ❌");
}
}

// ➕ ADD PRODUCT
window.addProduct=async function(){
if(!pname.value || !pprice.value || !pimg.value){
notify("Missing Info ⚠️");
return;
}

await supabase.from("products").insert([{
name:pname.value,
price:pprice.value,
image:pimg.value
}]);

notify("Product Added Successfully ✅");
setTimeout(()=>location.reload(),1000);
}

// 📋 LOAD ORDERS
async function loadOrders(){
let {data,error}=await supabase.from("orders").select("*");

if(error){
notify("Order Load Error ❌");
return;
}

let html="";
data.forEach(o=>{
html+=`<div>${o.name} - ${o.phone}</div>`;
});

orders.innerHTML=html;
}

</script>

</body>
</html>
