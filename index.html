<!DOCTYPE html>
<html>
<head>
  <title>My Toy Store</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }
    .product {
      border: 1px solid #ddd;
      padding: 10px;
      margin: 10px;
      display: inline-block;
      background: white;
    }
    button {
      background: green;
      color: white;
      padding: 5px 10px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>🧸 My Toy Store</h1>

  <div class="product">
    <h3>Teddy Bear</h3>
    <p>Price: $10</p>
    <button onclick="addToCart('Teddy Bear')">Add to Cart</button>
  </div>

  <div class="product">
    <h3>Car Toy</h3>
    <p>Price: $15</p>
    <button onclick="addToCart('Car Toy')">Add to Cart</button>
  </div>

  <h2>🛒 Cart</h2>
  <ul id="cart"></ul>

  <script>
    function addToCart(item) {
      let cart = document.getElementById("cart");
      let li = document.createElement("li");
      li.textContent = item;
      cart.appendChild(li);
    }
  </script>

</body>
</html>
