<!DOCTYPE html>
<html>
<head>
<title>China Toy World</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{margin:0;font-family:Arial;background:#fff5f7;}

header{
background:#ff3f6c;
color:white;
padding:18px;
font-size:26px;
text-align:center;
font-weight:bold;
position:relative;
}

.admin-btn{
position:absolute;
right:20px;
top:15px;
background:white;
color:#ff3f6c;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
width:220px;
margin:12px;
padding:10px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

button{
background:#ff3f6c;
color:white;
border:none;
padding:7px 12px;
margin-top:5px;
cursor:pointer;
border-radius:6px;
transition:0.3s;
}

button:hover{
box-shadow:0 0 10px #ff3f6c;
}

#notify{
position:fixed;
top:20px;
right:20px;
background:black;
color:white;
padding:10px;
border-radius:6px;
display:none;
}

#cartBox{
background:white;
margin:20px;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.admin-panel{
display:none;
background:#111;
color:white;
padding:20px;
}
</style>
</head>

<body>

<header>
🧸 CHINA TOY WORLD
<span class="admin-btn" onclick="adminLogin()">Admin</span>
</header>

<div id="notify"></div>

<h2 style="text-align:center;">Products</h2>
<div class="products" id="products"></div>

<div id="cartBox">
<h3>🛒 Cart</h3>
<ul id="cartList"></ul>
<h4 id="total"></h4>
</div>

<center>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<button onclick="placeOrder()">Order Now</button>
</center>

<!-- ADMIN -->
<div class="admin-panel" id="adminPanel">
<h2>Admin Panel</h2>

<input id="pname" placeholder="Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

<h3>Orders</h3>
<div id="orders"></div>
</div>

<script>

const supabase = window.supabase.createClient(
"https://guhhkfsbvbvhjbtkcuy.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1aGhrZnNidmJodmhqYnRrY3V5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTgwMzEsImV4cCI6MjA5MDk3NDAzMX0.fIJoWAWAlnjPvU9bc5a1CIlWg5aAt-9rCkLjlT3t1aw"
);

let cart=[];

// notify
function notify(msg){
let n=document.getElementById("notify");
n.innerText=msg;
n.style.display="block";
setTimeout(()=>n.style.display="none",2000);
}

// load products
async function load(){
let {data,error}=await supabase.from("products").select("*");

let html="";
data.forEach(p=>{
html+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<p>${p.price}৳</p>
<button onclick='addToCart(${JSON.stringify(p)})'>Add</button>
</div>`;
});
products.innerHTML=html;
}
load();

// cart add
function addToCart(p){
cart.push(p);
renderCart();
notify("Cart Added ✅");
}

// render cart
function renderCart(){
let html="";
let total=0;

cart.forEach((p,i)=>{
html+=`<li>${p.name} - ${p.price}৳ 
<button onclick="removeItem(${i})">❌</button></li>`;
total+=Number(p.price);
});

cartList.innerHTML=html;
total.innerText="Total: "+total+"৳";
}

// remove
function removeItem(i){
cart.splice(i,1);
renderCart();
notify("Removed ❌");
}

// order
async function placeOrder(){
if(!name.value || !phone.value){
notify("Info Missing ⚠️");
return;
}

await supabase.from("orders").insert([{
name:name.value,
phone:phone.value,
cart:JSON.stringify(cart)
}]);

notify("Order Placed ✅");
cart=[];
renderCart();
}

// admin login
function adminLogin(){
let p=prompt("Password");
if(p==="1234"){
adminPanel.style.display="block";
loadOrders();
}
}

// add product
async function addProduct(){
if(!pname.value || !pprice.value || !pimg.value){
notify("Missing Info ⚠️");
return;
}

await supabase.from("products").insert([{
name:pname.value,
price:pprice.value,
image:pimg.value
}]);

notify("Product Added ✅");
setTimeout(()=>location.reload(),1000);
}

// load orders
async function loadOrders(){
let {data}=await supabase.from("ORDERS").select("*");

let html="";
data.forEach(o=>{
html+=`<div>${o.name} - ${o.phone}</div>`;
});

orders.innerHTML=html;
}

</script>

</body>
</html>
