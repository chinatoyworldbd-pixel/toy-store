<!DOCTYPE html>
<html>
<head>
<title>China Toy World BD</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#fff5f7;
}

/* HEADER */
header {
  background:#ff3f6c;
  color:white;
  padding:20px;
  font-size:30px;
  text-align:center;
  font-weight:bold;
  position:relative;
}

.admin-btn {
  position:absolute;
  right:20px;
  top:20px;
  background:white;
  color:#ff3f6c;
  padding:6px 12px;
  border-radius:20px;
  cursor:pointer;
}

/* PRODUCTS */
.products {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card {
  background:white;
  width:220px;
  margin:12px;
  padding:12px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.1);
  text-align:center;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

/* BUTTON */
button {
  background:#ff3f6c;
  color:white;
  border:none;
  padding:8px 12px;
  margin-top:6px;
  cursor:pointer;
  border-radius:6px;
  transition:0.2s;
}

button:active {
  box-shadow:0 0 15px #ff3f6c;
}

/* NOTIFY */
#notify {
  position:fixed;
  top:20px;
  right:20px;
  background:#111;
  color:white;
  padding:12px;
  border-radius:8px;
  display:none;
}

/* CART */
#cartBox {
  background:white;
  margin:20px;
  padding:15px;
  border-radius:10px;
}

/* ADMIN */
.admin-panel {
  display:none;
  background:#111;
  color:white;
  padding:20px;
}

input {
  padding:8px;
  margin:5px;
}
</style>
</head>

<body>

<header>
🧸 CHINA TOY WORLD
<span class="admin-btn" onclick="adminLogin()">Admin</span>
</header>

<div id="notify"></div>

<h2 style="text-align:center;">🛍 Products</h2>
<div class="products" id="products"></div>

<div id="cartBox">
<h3>🛒 Cart</h3>
<ul id="cartList"></ul>
<h4 id="total"></h4>
</div>

<center>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<button onclick="placeOrder()">Order Now</button>
</center>

<!-- ADMIN -->
<div class="admin-panel" id="adminPanel">
<h2>Admin Panel</h2>

<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">

<button id="addBtn">Add Product</button>

<h3>Orders</h3>
<div id="orders"></div>
</div>

<script>

// ✅ SUPABASE CONNECT (YOUR CODE OK)
const supabase = window.supabase.createClient(
  "https://guhhkfsbvbvhjbtkcuy.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1aGhrZnNidmJodmhqYnRrY3V5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTgwMzEsImV4cCI6MjA5MDk3NDAzMX0.fIJoWAWAlnjPvU9bc5a1CIlWg5aAt-9rCkLjlT3t1aw"
);

let cart=[];

/* NOTIFY */
function notify(msg){
  let n=document.getElementById("notify");
  n.innerText=msg;
  n.style.display="block";
  setTimeout(()=>n.style.display="none",2000);
}

/* LOAD PRODUCTS FROM DB */
async function load(){
  let {data,error} = await supabase.from("products").select("*");

  let html="";
  data.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.image}">
      <h4>${p.name}</h4>
      <p>${p.price}৳</p>
      <button onclick='addToCart(${JSON.stringify(p)})'>Add to Cart</button>
    </div>`;
  });

  products.innerHTML=html;
}
load();

/* CART */
function addToCart(p){
  cart.push(p);
  renderCart();
  notify("🛒 Cart add successful");
}

function renderCart(){
  let html="";
  let total=0;

  cart.forEach((p,i)=>{
    html+=`
    <li>${p.name} - ${p.price}৳ 
    <button onclick="removeItem(${i})">❌</button></li>`;
    total+=Number(p.price);
  });

  cartList.innerHTML=html;
  total.innerText="Total: "+total+"৳";
}

function removeItem(i){
  cart.splice(i,1);
  renderCart();
  notify("❌ Removed successful");
}

/* ORDER */
async function placeOrder(){

  if(!name.value || !phone.value){
    notify("⚠️ Info missing");
    return;
  }

  await supabase.from("orders").insert([{
    name:name.value,
    phone:phone.value,
    cart: JSON.stringify(cart)
  }]);

  notify("🎉 Order placed successful");

  cart=[];
  renderCart();
}

/* ADMIN */
function adminLogin(){
  let p=prompt("Password");
  if(p==="1234"){
    adminPanel.style.display="block";
    loadOrders();
  }
}

/* ADD PRODUCT */
document.getElementById("addBtn").addEventListener("click",async ()=>{

  if(!pname.value || !pprice.value || !pimg.value){
    notify("⚠️ Info missing");
    return;
  }

  addBtn.style.boxShadow="0 0 20px #00ff00";

  await supabase.from("products").insert([{
    name:pname.value,
    price:pprice.value,
    image:pimg.value
  }]);

  notify("✅ Product add successful");

  load();
});

/* LOAD ORDERS */
async function loadOrders(){
  let {data} = await supabase.from("orders").select("*");

  let html="";
  data.forEach(o=>{
    html+=`<div>👤 ${o.name} - 📞 ${o.phone}</div>`;
  });

  orders.innerHTML=html;
}

</script>

</body>
</html>
