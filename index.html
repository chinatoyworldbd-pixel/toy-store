<!DOCTYPE html>
<html>
<head>
  <title>China Toy World</title>
  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }

    header {
      background:#ff4d6d;
      color:white;
      padding:15px;
      text-align:center;
      position:relative;
    }

    .admin-btn {
      position:absolute;
      right:20px;
      top:15px;
      background:black;
      color:white;
      padding:5px 10px;
      cursor:pointer;
    }

    .hero {
      background:url('https://i.imgur.com/7yUvePI.jpg');
      background-size:cover;
      color:white;
      text-align:center;
      padding:100px 20px;
    }

    .hero h1 {
      font-size:40px;
    }

    .products {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
    }

    .card {
      background:white;
      padding:10px;
      margin:10px;
      width:200px;
      text-align:center;
      border-radius:10px;
    }

    img {
      width:100%;
      height:150px;
      object-fit:cover;
    }

    button {
      background:green;
      color:white;
      border:none;
      padding:5px 10px;
      cursor:pointer;
    }

    .admin-panel {
      display:none;
      background:#fff;
      padding:20px;
      margin:20px;
    }

    .order-box {
      background:white;
      margin:10px;
      padding:10px;
    }
  </style>
</head>

<body>

<header>
  🧸 China Toy World
  <span class="admin-btn" onclick="adminLogin()">Admin</span>
</header>

<div class="hero">
  <h1>WE SELL HAPPINESS</h1>
</div>

<h2 style="text-align:center;">Products</h2>
<div class="products" id="products"></div>

<h2 style="text-align:center;">Order</h2>
<center>
  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <button onclick="placeOrder()">Order Now</button>
</center>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
  <h2>Admin Dashboard</h2>

  <h3>Add Product</h3>
  <input id="pname" placeholder="Product Name">
  <input id="pprice" placeholder="Price">
  <input id="pimg" placeholder="Image URL">
  <button onclick="addProduct()">Add</button>

  <h3>Orders</h3>
  <div id="orders"></div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHcIM6tcVzcj4YMqBiceU-2mkc2tDIRLw",
  authDomain: "china-toy-world.firebaseapp.com",
  projectId: "china-toy-world",
  storageBucket: "china-toy-world.firebasestorage.app",
  messagingSenderId: "203693443354",
  appId: "1:203693443354:web:e89dc8ba3dca3c81b404a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// LOAD PRODUCTS
async function loadProducts(){
  const querySnapshot = await getDocs(collection(db,"products"));
  let html="";
  querySnapshot.forEach(doc=>{
    let p=doc.data();
    html+=`
    <div class="card">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p>${p.price}৳</p>
    </div>`;
  });
  document.getElementById("products").innerHTML=html;
}
loadProducts();

// ADD PRODUCT
window.addProduct = async function(){
  let name=document.getElementById("pname").value;
  let price=document.getElementById("pprice").value;
  let img=document.getElementById("pimg").value;

  await addDoc(collection(db,"products"),{name,price,img});
  alert("Product Added!");
  location.reload();
}

// ORDER
window.placeOrder = async function(){
  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;

  await addDoc(collection(db,"orders"),{name,phone});
  alert("Order Placed!");
}

// LOAD ORDERS
async function loadOrders(){
  const querySnapshot = await getDocs(collection(db,"orders"));
  let html="";
  querySnapshot.forEach(doc=>{
    let o=doc.data();
    html+=`<div class="order-box">${o.name} - ${o.phone}</div>`;
  });
  document.getElementById("orders").innerHTML=html;
}

// ADMIN LOGIN
window.adminLogin=function(){
  let pass=prompt("Enter Password");
  if(pass==="14@66"){
    document.getElementById("adminPanel").style.display="block";
    loadOrders();
  } else {
    alert("Wrong password");
  }
}
</script>

</body>
</html>
