<!DOCTYPE html>
<html>
<head>
  <title>China Toy World </title>
  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }

    header {
      background:#ff4d6d;
      color:Pink;
      padding:15px;
      text-align:center;
      font-size:24px;
      font-weight:bold;
    }

    .banner {
      background:url('https://images.unsplash.com/photo-1601758064224-62f47f2fa5a0');
      background-size:cover;
      height:250px;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      font-weight:bold;
    }

    .products {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:20px;
    }

    .product {
      background:white;
      padding:10px;
      margin:10px;
      width:180px;
      border-radius:10px;
      text-align:center;
    }

    .product img {
      width:100%;
      height:120px;
      object-fit:cover;
    }

    button {
      background:#28a745;
      color:white;
      border:none;
      padding:5px 10px;
      cursor:pointer;
      margin-top:5px;
    }
  </style>
</head>
<body>

<header>🧸 China Toy World </header>

<div class="banner">
  WE SELL HAPPINESS
</div>

<h2 style="text-align:center;">🛍️ Products</h2>
<div class="products" id="products"></div>

<h2 style="text-align:center;">🛒 Cart</h2>
<ul id="cart"></ul>
<h3 id="total"></h3>

<h2 style="text-align:center;">📦 Order</h2>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<button onclick="placeOrder()">Order Now</button>

<h2 style="text-align:center;">💳 bKash</h2>
<p style="text-align:center;">Send to: 01722454716</p>

<script>
let cart = [];

function addToCart(name, price){
  cart.push({name, price});
  renderCart();
}

function renderCart(){
  let html="";
  let total=0;

  cart.forEach(p=>{
    html += `<li>${p.name} - ${p.price}</li>`;
    total += Number(p.price);
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = "Total: " + total;
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "china-toy-world.firebaseapp.com",
  projectId: "china-toy-world"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

onSnapshot(collection(db,"products"), snap=>{
  let html="";
  snap.forEach(doc=>{
    let p = doc.data();
    html += `
    <div class="product">
      <img src="${p.image}">
      <h4>${p.name}</h4>
      <p>${p.price}</p>
      <button onclick="addToCart('${p.name}',${p.price})">Add</button>
    </div>`;
  });
  document.getElementById("products").innerHTML = html;
});

window.placeOrder = async ()=>{
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  await addDoc(collection(db,"orders"),{
    name, phone, cart
  });

  alert("Order Done");
}
</script>

</body>
</html>
