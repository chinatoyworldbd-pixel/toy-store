<!DOCTYPE html>
<html>
<head>
  <title>China Toy World BD</title>
  <style>
    body { font-family: Arial; text-align:center; background:#f5f5f5; }
    .product { border:1px solid #ddd; padding:10px; margin:10px; display:inline-block; background:white; }
    button { background:green; color:white; padding:5px 10px; border:none; cursor:pointer; }
    input { padding:5px; margin:5px; }
    #admin { margin:20px; padding:10px; background:#fff; }
  </style>
</head>
<body>

<h1>🧸 China Toy World BD</h1>

<!-- ADMIN PANEL -->
<div id="admin">
  <h2>➕ Add Product</h2>
  <input id="name" placeholder="Product Name">
  <input id="price" placeholder="Price">
  <button onclick="addProduct()">Add Product</button>
</div>

<!-- PRODUCTS -->
<h2>🛍️ Products</h2>
<div id="products"></div>

<!-- CART -->
<h2>🛒 Cart</h2>
<ul id="cart"></ul>
<h3 id="total"></h3>

<!-- PAYMENT -->
<h2>💳 Payment (bKash)</h2>
<p>Send money to: <b>01XXXXXXXXX</b></p>
<p>After payment, send screenshot via WhatsApp</p>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = [];

function renderProducts() {
  let container = document.getElementById("products");
  container.innerHTML = "";
  products.forEach((p, index) => {
    container.innerHTML += `
      <div class="product">
        <h3>${p.name}</h3>
        <p>Price: ${p.price}</p>
        <button onclick="addToCart(${index})">Add to Cart</button>
      </div>
    `;
  });
}

function addProduct() {
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  if(name && price){
    products.push({name, price});
    localStorage.setItem("products", JSON.stringify(products));
    renderProducts();
  }
}

function addToCart(index) {
  cart.push(products[index]);
  renderCart();
}

function renderCart() {
  let list = document.getElementById("cart");
  let total = 0;
  list.innerHTML = "";
  cart.forEach(item => {
    list.innerHTML += `<li>${item.name} - ${item.price}</li>`;
    total += Number(item.price);
  });
  document.getElementById("total").innerText = "Total: $" + total;
}

renderProducts();
</script>

</body>
</html>
