<!DOCTYPE html>
<html>
<head>
<title>China Toy World</title>

<!-- ✅ ONLY ONE SUPABASE SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#fff5f7;}

header{
background:#ff3f6c;
color:white;
padding:18px;
font-size:28px;
text-align:center;
font-weight:bold;
position:relative;
}

.admin-btn{
position:absolute;
right:20px;
top:15px;
background:white;
color:#ff3f6c;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

button{
background:#ff3f6c;
color:white;
border:none;
padding:7px 12px;
margin-top:5px;
cursor:pointer;
border-radius:6px;
transition:0.3s;
}

button:hover{
box-shadow:0 0 12px #ff3f6c;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
width:220px;
margin:12px;
padding:10px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

#notify{
position:fixed;
top:20px;
right:20px;
background:black;
color:white;
padding:10px;
border-radius:6px;
display:none;
}

#cartBox{
background:white;
margin:20px;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.admin-panel{
display:none;
background:#111;
color:white;
padding:20px;
}
</style>
</head>

<body>

<header>
🧸 CHINA TOY WORLD
<span class="admin-btn" onclick="adminLogin()">Admin</span>
</header>

<div id="notify"></div>

<h2 style="text-align:center;">Products</h2>
<div class="products" id="products"></div>

<div id="cartBox">
<h3>🛒 Cart</h3>
<ul id="cartList"></ul>
<h4 id="total"></h4>
</div>

<center>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<button onclick="placeOrder()">Order Now</button>
</center>

<!-- ADMIN -->
<div class="admin-panel" id="adminPanel">
<h2>Admin Panel</h2>

<input id="pname" placeholder="Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

<h3>Orders</h3>
<div id="orders"></div>
</div>

<script>

// ✅ FIXED SUPABASE INIT
const supabase = window.supabase.createClient(
"https://guhhkfsbvbvhjbtkcuy.supabase.co",
"YOUR_ANON_KEY_HERE"
);

let cart=[];

// notify
function notify(msg){
let n=document.getElementById("notify");
n.innerText=msg;
n.style.display="block";
setTimeout(()=>n.style.display="none",2000);
}

// load products
async function load(){
let {data,error}=await supabase.from("products").select("*");

if(error){
console.log(error);
notify("Database Error ❌");
return;
}

let html="";
data.forEach(p=>{
html+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<p>${p.price}৳</p>
<button onclick='addToCart(${JSON.stringify(p)})'>Add</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}
load();

// ✅ GLOBAL FUNCTIONS FIX
window.addToCart=function(p){
cart.push(p);
renderCart();
notify("Added to Cart ✅");
}

function renderCart(){
let html="";
let totalPrice=0;

cart.forEach((p,i)=>{
html+=`<li>${p.name} - ${p.price}৳ 
<button onclick="removeItem(${i})">❌</button></li>`;
totalPrice+=Number(p.price);
});

document.getElementById("cartList").innerHTML=html;
document.getElementById("total").innerText="Total: "+totalPrice+"৳";
}

window.removeItem=function(i){
cart.splice(i,1);
renderCart();
notify("Removed ❌");
}

// order
window.placeOrder=async function(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

if(!name || !phone){
notify("Info Missing ⚠️");
return;
}

let {error}=await supabase.from("orders").insert([{
name,
phone,
cart:JSON.stringify(cart)
}]);

if(error){
notify("Order Failed ❌");
}else{
notify("Order Placed ✅");
cart=[];
renderCart();
}
}

// admin login
window.adminLogin=function(){
let p=prompt("Password");
if(p==="1234"){
document.getElementById("adminPanel").style.display="block";
loadOrders();
}else{
notify("Wrong Password ❌");
}
}

// add product
window.addProduct=async function(){
let name=document.getElementById("pname").value;
let price=document.getElementById("pprice").value;
let image=document.getElementById("pimg").value;

if(!name || !price || !image){
notify("Missing Info ⚠️");
return;
}

let {error}=await supabase.from("products").insert([{
name,price,image
}]);

if(error){
notify("Add Failed ❌");
}else{
notify("Product Added ✅");
setTimeout(()=>location.reload(),1000);
}
}

// load orders
async function loadOrders(){
let {data,error}=await supabase.from("orders").select("*");

if(error){
notify("Order Load Failed ❌");
return;
}

let html="";
data.forEach(o=>{
html+=`<div>${o.name} - ${o.phone}</div>`;
});

document.getElementById("orders").innerHTML=html;
}

</script>

</body>
</html>
